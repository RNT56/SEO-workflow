name: Release

on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish the release package set to npm. Requires NPM_TOKEN."
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm test:fixtures
      - run: pnpm security
      - run: pnpm release:check
      - run: pnpm release:pack
      - uses: actions/upload-artifact@v6
        with:
          name: npm-release-tarballs
          path: .release-tarballs/*.tgz
          if-no-files-found: error
          include-hidden-files: true

  publish-npm:
    runs-on: ubuntu-latest
    needs: release-check
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_npm }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm release:check
      - name: Verify npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is required to publish npm packages." >&2
            exit 1
          fi
      - run: pnpm release:publish:npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
